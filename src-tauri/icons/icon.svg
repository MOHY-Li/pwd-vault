<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lock-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2318;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Shield -->
  <path d="M256 48 L448 128 L448 272 C448 368 368 432 256 464 C144 432 64 368 64 272 L64 128 Z" 
        fill="url(#shield-grad)" filter="url(#shadow)"/>
  
  <!-- Shield highlight -->
  <path d="M256 64 L432 136 L432 272 C432 356 360 416 256 448 C152 416 80 356 80 272 L80 136 Z" 
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  
  <!-- Lock body -->
  <rect x="172" y="248" width="168" height="128" rx="16" fill="url(#lock-grad)"/>
  
  <!-- Lock body highlight -->
  <rect x="172" y="248" width="168" height="128" rx="16" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  
  <!-- Lock shackle -->
  <path d="M200 248 L200 200 C200 160 232 136 256 136 C280 136 312 160 312 200 L312 248" 
        fill="none" stroke="url(#lock-grad)" stroke-width="28" stroke-linecap="round"/>
  <path d="M200 248 L200 200 C200 160 232 136 256 136 C280 136 312 160 312 200 L312 248" 
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="30" stroke-linecap="round"/>
  
  <!-- Keyhole -->
  <circle cx="256" cy="300" r="20" fill="#34d399"/>
  <rect x="249" y="300" width="14" height="32" rx="7" fill="#34d399"/>
  
  <!-- Keyhole inner -->
  <circle cx="256" cy="300" r="10" fill="#059669"/>
  <rect x="252" y="300" width="8" height="24" rx="4" fill="#059669"/>
</svg>